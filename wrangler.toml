# Wrangler / Cloudflare Pages configuration.
#
# The site is fully static — there is no Worker. Cloudflare Pages
# serves dist/ directly. The settings the Pages dashboard needs are:
#
#   Framework preset:        Astro
#   Build command:           npm run build
#   Build output directory:  dist
#   Root directory:          /
#   Node version:            22  (env var: NODE_VERSION)
#
# Add a Phase 2 Worker by re-introducing @astrojs/cloudflare in
# astro.config.mjs and switching output to "server" or "hybrid".
# At that point the KV / R2 / D1 bindings live here.

name = "keralapromises"
pages_build_output_dir = "./dist"
compatibility_date = "2026-05-01"
